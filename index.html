<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum Aura</title>
    
    <!-- ВАЖНО: Подключаем SDK для Telegram Mini Apps -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Контейнер для центрального свечения -->
    <div class="glow-container">
        <div class="aurora-blob"></div>
        <div class="aurora-blob second-blob"></div>
    </div>

    <!-- Информационное окно Mini App -->
    <div class="glass-panel" id="user-card" style="display: none;">
        <div class="avatar-container">
            <!-- Сюда будем подставлять фото, если оно есть, или инициалы -->
            <div id="user-avatar" class="avatar-placeholder">?</div>
        </div>
        
        <h2 id="greeting">Welcome!</h2>
        <p class="subtitle" id="user-info">Loading your profile...</p>
        
        <button class="tg-login-btn" id="main-btn">
            Continue
        </button>
    </div>

    <!-- Главная страница (Main Page) -->
    <div class="main-page" id="main-page" style="display: none;">
        <!-- Статичное свечение для шапки -->
        <div class="header-glow"></div>
        
        <div class="main-header">
            <div class="header-content">
                <h1 class="main-title">Sets of words</h1>
                <div id="main-avatar" class="header-avatar">?</div>
            </div>
        </div>
        
        <!-- Контейнер для списка библиотек -->
        <div id="libraries-list" class="libraries-container"></div>
        
        <button class="fab-btn" id="add-btn">
            +
        </button>
    </div>

    <!-- Модальное окно для создания новой библиотеки -->
    <div class="modal-overlay" id="create-library-modal" style="display: none;">
        <div class="glass-panel modal-content">
            
            <div class="input-row" style="display: flex; gap: 12px; margin-bottom: 24px; align-items: center; width: 100%;">
                <div class="emoji-picker-container">
                    <div class="emoji-picker-btn" id="emoji-display" style="cursor: pointer;">
                        <span id="selected-emoji" style="display: flex; align-items: center; justify-content: center;"><img src="https://emojicdn.elk.sh/😀?style=apple" alt="😀" style="width: 40px; height: 40px; filter: grayscale(100%) opacity(0.6);" /></span>
                        <span class="emoji-plus" id="emoji-plus">+</span>
                    </div>
                </div>
                <input type="text" id="library-name-input" class="tg-input" placeholder="lib name" style="margin-bottom: 0; flex: 1;" maxlength="14">
            </div>

            <!-- Выбор цвета папки -->
            <div class="color-picker" id="folder-color-picker">
                <div class="color-swatch selected" data-color-class="folder-color-white" style="background: rgba(255, 255, 255, 0.6);"></div>
                <div class="color-swatch" data-color-class="folder-color-lightblue" style="background: rgba(0, 200, 255, 0.6);"></div>
                <div class="color-swatch" data-color-class="folder-color-blue" style="background: rgba(30, 80, 255, 0.6);"></div>
                <div class="color-swatch" data-color-class="folder-color-red" style="background: rgba(255, 80, 80, 0.6);"></div>
                <div class="color-swatch" data-color-class="folder-color-orange" style="background: rgba(255, 150, 0, 0.6);"></div>
                <div class="color-swatch" data-color-class="folder-color-yellow" style="background: rgba(255, 230, 0, 0.6);"></div>
                <div class="color-swatch" data-color-class="folder-color-green" style="background: rgba(0, 255, 100, 0.6);"></div>
                <div class="color-swatch" data-color-class="folder-color-purple" style="background: rgba(139, 0, 255, 0.6);"></div>
            </div>

            <div class="modal-actions">
                <button class="tg-btn-secondary" id="delete-lib-btn" style="display: none; padding: 0; width: 48px; height: 48px; border-radius: 50%; flex: 0 0 48px; justify-content: center; align-items: center; border-color: rgba(255, 80, 80, 0.4); color: #ff5050;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>
                <button class="tg-login-btn" id="save-btn" style="padding: 12px; flex: 1;">Save</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно для выбора эмодзи -->
    <div class="modal-overlay" id="emoji-picker-modal" style="display: none; z-index: 150;">
        <div class="glass-panel modal-content" style="width: 320px; padding: 24px;">
            <h3 style="margin: 0 0 16px; font-size: 18px; font-weight: 500;">Choose Icon</h3>
            <div class="emoji-grid" id="emoji-grid">
                <!-- Эмодзи генерируются через JS -->
            </div>
            <button class="tg-btn-secondary" id="close-emoji-picker" style="margin-top: 20px; width: 100%;">Close</button>
        </div>
    </div>

    <!-- Окно просмотра библиотеки (Library View) -->
    <div class="main-page" id="library-page" style="display: none;">
        <div class="header-glow"></div>
        <div class="main-header">
            <div class="header-content" style="grid-template-columns: 40px minmax(0, 1fr) 40px;">
                <button class="icon-btn" id="back-to-main-btn" style="grid-column: 1; justify-self: start;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <h1 class="main-title" id="library-title-display">Set</h1>
                <div style="grid-column: 3;"></div>
            </div>
        </div>
        
        <div class="library-content">
            <form id="add-word-form" style="display: flex; gap: 12px; width: 100%; align-items: center; padding: 0 20px 24px 20px; box-sizing: border-box; margin: 0;">
                <input type="text" id="word-input" class="tg-input" placeholder="Word" style="margin-bottom: 0; flex: 1; border-radius: 50px;">
                <input type="text" id="translation-input" class="tg-input" placeholder="Translation" style="margin-bottom: 0; flex: 1; border-radius: 50px;">
                <button type="submit" class="tg-login-btn btn-disabled-red" id="add-word-btn" style="padding: 0; width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0; font-size: 24px; display: flex; justify-content: center; align-items: center;">+</button>
            </form>
            <div id="words-list" class="words-list-container"></div>
        </div>
        <button class="study-fab" id="study-btn" style="display: none;">Start Study</button>
    </div>

    <!-- Окно изучения (Study View) -->
    <div class="main-page" id="study-page" style="display: none;">
        <div class="header-glow"></div>
        <div class="main-header">
            <div class="header-content" style="grid-template-columns: 40px minmax(0, 1fr) 40px;">
                <button class="icon-btn" id="back-to-lib-btn" style="grid-column: 1; justify-self: start;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <h1 class="main-title" id="study-title-display">Study</h1>
                <div id="study-progress" style="grid-column: 3; justify-self: end; font-size: 14px; opacity: 0.7;">1/5</div>
            </div>
        </div>
        <div class="study-content">
            <div class="flashcard" id="flashcard">
                <div class="flashcard-inner" id="flashcard-inner">
                    <div class="flashcard-front"><h2 id="card-word">Word</h2></div>
                    <div class="flashcard-back"><h2 id="card-translation">Translation</h2></div>
                </div>
            </div>
            <div class="study-controls">
                <button class="tg-btn-secondary" id="prev-btn" style="flex: 0.3;">Prev</button>
                <button class="tg-login-btn" id="next-btn" style="flex: 0.7; padding: 12px;">Next</button>
            </div>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
