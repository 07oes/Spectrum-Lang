<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum Aura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Контейнер для центрального свечения -->
    <div class="glow-container">
        <div class="aurora-blob"></div>
        <div class="aurora-blob second-blob"></div>
    </div>

    <!-- Окно входа со стеклянным эффектом -->
    <div class="glass-panel">
        <h2>Welcome</h2>
        <p class="subtitle">Log in using your Telegram account to continue.</p>
        
        <!-- Официальный виджет авторизации Telegram -->
        <div class="tg-widget-container">
            <!-- ВАЖНО: Замените "YOUR_BOT_USERNAME_HERE" на username вашего бота (без @) -->
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login="spectrumlang_bot" 
                    data-size="large" 
                    data-radius="14" 
                    data-onauth="onTelegramAuth(user)" 
                    data-request-access="write"></script>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
